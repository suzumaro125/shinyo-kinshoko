<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>神妖黙示録の禁書庫</title>

<style>

body{
    margin:0;
    background:#0a0a12;
    color:white;
    font-family:sans-serif;
}

header{
    text-align:center;
    padding:20px;
    background:#111827;
    border-bottom:2px solid #7c3aed;
}

h1{
    margin:0;
    color:#d8b4fe;
}

.sub{
    color:#9ca3af;
    margin-top:5px;
}

.banner{
    width:100%;
    max-height:300px;
    object-fit:cover;
}

.container{
    padding:15px;
}

.card{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:12px;
    margin-bottom:15px;
    overflow:hidden;
}

.card button{
    width:100%;
    background:#1f2937;
    color:white;
    border:none;
    padding:15px;
    font-size:18px;
    text-align:left;
}

.content{
    display:none;
    padding:15px;
}

.content p{
    line-height:1.8;
}

footer{
    text-align:center;
    padding:20px;
    color:#888;
}

</style>
</head>

<body>

<header>
<h1>神妖黙示録の禁書庫</h1>
<div class="sub">
クトゥルフ神話TRPG オリジナルサプリメント
</div>
</header>

<div class="container">

<div class="card">
<button onclick="toggle(this)">
📖 ルールブック
</button>
<div class="content">
<p>
神妖黙示録の基本ルールをまとめるページ。
</p>
</div>
</div>

<div class="card">
<button onclick="toggle(this)">
⚔️ 戦闘ルール
</button>
<div class="content">
<p>
神心技システム、運命力システム、
属性戦闘ルールなどを掲載。
</p>
</div>
</div>

<div class="card">
<button onclick="toggle(this)">
🧙 魔術一覧
</button>
<div class="content">
<p>
炎・氷・雷・影・龍・星の
各属性魔術データベース。
</p>
</div>
</div>

<div class="card">
<button onclick="toggle(this)">
😈 神妖図鑑
</button>
<div class="content">
<p>
神話生物や妖怪データを掲載。
</p>
</div>
</div>

<div class="card">
<button onclick="toggle(this)">
👤 キャラクター作成
</button>
<div class="content">
<p>
探索者作成ルール。
</p>
</div>
</div>

<div class="card">
<button onclick="toggle(this)">
🎲 GMガイド
</button>
<div class="content">
<p>
GM向けルール・裁定集。
</p>
</div>
</div>

</div>

<footer>
神妖黙示録の禁書庫 Ver1.0
</footer>

<script>

function toggle(button){

const content =
button.nextElementSibling;

if(content.style.display==="block"){
content.style.display="none";
}else{
content.style.display="block";
}

}

</script>

</body>
</html>
